name: Threads Auto Post

on:
  # 毎日 日本時間 18:00 (JST) = UTC 11:00 に実行
  # cron は UTC 基準なので要注意
  schedule:
    - cron: '0 9 * * *'

  # 手動実行も可能にする（GitHubのActionsタブから「Run workflow」で）
  workflow_dispatch:

# GITHUB_TOKEN に書き込み権限を付与（commitのため）
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python post_to_threads.py

      - name: Commit updated posts file
        # 投稿成功後、postedフラグが変わったJSONをコミット
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add threads_posts_50.json
          # 差分があるときだけcommit
          if ! git diff --staged --quiet; then
            git commit -m "chore: update posted status [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
